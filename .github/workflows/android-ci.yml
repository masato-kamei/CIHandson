name: Android CI (Fast + Lint Summary)

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Compile + Lint summary
    runs-on: ubuntu-latest

    steps:
      - name: ソースコード取得
        uses: actions/checkout@v4

      - name: Java環境セットアップ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradleキャッシュ設定
        uses: gradle/actions/setup-gradle@v3

      - name: gradlewへ実行権限付与
        run: chmod +x gradlew

      - name: コンパイル実行
        run: ./gradlew compileDebugSources --parallel

      - name: Lint実行
        run: ./gradlew lintDebug

      - name: Lint警告サマリ生成
        shell: bash
        run: |
          REPORT="app/build/reports/lint-results-debug.txt"
          OUT="lint-warning-summary.md"
    
          echo "## Android Lint warnings" > "$OUT"
          echo "" >> "$OUT"
    
          if [ -f "$REPORT" ]; then
            grep " Warning: " "$REPORT" \
              | sed -E 's#^/home/runner/work/[^/]+/[^/]+/##' \
              | head -n 50 \
              | sed 's/^/- /' >> "$OUT"
          else
            echo "- lint text report was not found." >> "$OUT"
          fi
    
          if [ "$(wc -l < "$OUT")" -le 2 ]; then
            echo "- No lint warnings found." >> "$OUT"
          fi

      - name: Lint警告をPRへ投稿
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: lint-warning-summary.md

      - name: Lintレポート保存
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: app/build/reports/