name: Android CI (Fast + Lint)

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Compile + Lint (fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # キャッシュ＋Gradle高速化
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      # ✅ コンパイル（最速チェック）
      - name: Compile
        run: ./gradlew compileDebugSources --parallel

      # ✅ lint（最小構成）
      - name: Lint
        run: ./gradlew lintDebug
  ``