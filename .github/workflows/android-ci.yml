name: Android CI (Fast + Lint Summary)

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Compile + Lint summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew compileDebugSources --parallel

      - name: Lint non-blocking for warnings
        run: ./gradlew lintDebug || true

      - name: Create lint warning summary
        shell: bash
        run: |
          REPORT="app/build/reports/lint-results-debug.txt"
          OUT="lint-warning-summary.md"

          echo "## Android Lint warnings" > "$OUT"
          echo "" >> "$OUT"

          if [ -f "$REPORT" ]; then
            grep " Warning: " "$REPORT" \
              | sed -E 's#^/home/runner/work/[^/]+/[^/]+/##' \
              | head -n 50 \
              | sed 's/^/- /' >> "$OUT"
          else
            echo "- lint text report was not found." >> "$OUT"
          fi

          if [ "$(wc -l < "$OUT")" -le 2 ]; then
            echo "- No lint warnings found." >> "$OUT"
          fi

      - name: Comment lint warning summary
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: lint-warning-summary.md

      - name: Upload full lint reports
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: app/build/reports/