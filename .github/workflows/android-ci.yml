name: Android CI (Fast)

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Compile only (fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Gradleキャッシュ（高速化のコア）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      # コンパイルのみ（最速）
      - name: Compile
        run: ./gradlew compileDebugSources --parallel
