name: Android CI (Fast + Lint Report)

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Compile + Lint (report)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew compileDebugSources --parallel

      - name: Lint (non-blocking)
        run: ./gradlew lintDebug --console=plain || true

      - name: Comment lint result
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: app/build/reports/lint-results-debug.txt