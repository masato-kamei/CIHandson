name: Nightly Signed APK Build

on:
  schedule:
    - cron: "0 15 * * *"

  workflow_dispatch:

jobs:
  build-release-apk:
    name: Build Signed APK
    runs-on: ubuntu-latest

    env:
      NIGHTLY_LINT: true

      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: ソースコード取得
        uses: actions/checkout@v4

      - name: Java環境セットアップ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradleキャッシュ設定
        uses: gradle/actions/setup-gradle@v3

      - name: gradlewへ実行権限付与
        run: chmod +x gradlew

      - name: 署名鍵を復元
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/cihandsonkeystore.jks

      - name: Release向けLint実行
        run: ./gradlew lintRelease || true

      - name: 署名付きAPK生成
        run: ./gradlew assembleRelease --parallel

      - name: APKをArtifactへ保存
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: app/build/outputs/apk/release/*.apk

      - name: LintレポートをArtifactへ保存
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/